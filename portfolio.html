<!DOCTYPE html>
<html lang="ko">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { font-family: "Pretendard Variable", sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50 px-6 py-3 border-b border-gray-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <img src="logo.png" alt="YSDNC" class="h-10 w-auto"> 
                <span class="font-bold text-xl tracking-tighter">(주)윤성디앤씨</span>
            </a>
            <ul class="flex gap-6 font-semibold text-sm">
                <li><a href="index.html" class="hover:text-blue-600 transition">홈</a></li>
                <li><a href="portfolio.html" class="text-blue-600">현장정보</a></li>
            </ul>
        </div>
    </nav>

    <header class="bg-slate-900 py-20 text-center text-white px-6">
        <h1 class="text-3xl md:text-4xl font-black mb-3 tracking-tight">I-tower 상세보기</h1>

    </header>

    <main class="max-w-6xl mx-auto py-20 px-6 grid md:grid-cols-2 gap-12">
        
        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col border border-gray-100 hover:shadow-2xl transition-shadow">
            <div class="h-72 bg-gray-200 overflow-hidden">
                <img src="itower1.jpg" alt="I-TOWER" class="w-full h-full object-cover">
            </div>
            <div class="p-10 flex-1 flex flex-col">
                <h2 class="text-2xl font-black mb-4 tracking-tight">고덕 지식공작소 I-TOWER</h2>
                <p class="text-gray-600 mb-10 text-sm leading-relaxed italic">"삼성전자 P5 정문 2km, 도면 너머의 숨겨진 가치를 분석한 단독 리포트"</p>
                <div class="mt-auto">
                    <a href="itower.html" class="block w-full bg-blue-600 text-white text-center py-4.5 rounded-2xl font-bold hover:bg-slate-900 transition shadow-lg">상세 분석 리포트 보기</a>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden flex flex-col border-t-8 border-t-orange-500 border-x border-b border-gray-100 hover:shadow-2xl transition-shadow">
            <div class="h-72 bg-gray-200 overflow-hidden">
                <img src="wtower1.jpg" alt="W-TOWER" class="w-full h-full object-cover">
            </div>
            <div class="p-10 flex-1 flex flex-col">
                <h2 class="text-2xl font-black mb-4 tracking-tight">고덕 2차 W-TOWER</h2>
                <p class="text-gray-600 mb-10 text-sm leading-relaxed italic">"13,800평 압도적 스케일, 지상 5층 도어투도어 시스템 분석 리포트"</p>
                <div class="mt-auto">
                    <a href="wtower.html" class="block w-full bg-orange-600 text-white text-center py-4.5 rounded-2xl font-bold hover:bg-slate-900 transition shadow-lg">상세 분석 리포트 보기</a>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-100 py-12 px-6">
        <div class="max-w-6xl mx-auto text-center md:text-left">
            <p class="text-slate-900 font-bold mb-2">(주)윤성디앤씨</p>
            <p class="text-gray-400 text-sm italic">평택시 고덕면 도시지원1길 49, W-tower 1층</p>
        </div>
    </footer>

</html>
